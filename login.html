<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Tournyx</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-bg: #050511;
            --card-bg: rgba(20, 20, 35, 0.85);
            --input-bg: rgba(10, 10, 20, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-gradient: linear-gradient(90deg, #bd00ff, #00f2ff);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050511 100%);
        }

        /* --- Auth Card --- */
        .auth-container { width: 100%; max-width: 420px; padding: 20px; z-index: 10; }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: var(--accent-gradient);
        }

        .logo-area { text-align: center; margin-bottom: 25px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0% 100%);
            margin-bottom: 10px;
        }
        .app-name { font-family: var(--font-display); font-size: 1.5rem; letter-spacing: 2px; }

        /* --- Tabs --- */
        .role-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        
        .role-tab-btn {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            font-family: var(--font-display); font-size: 0.9rem;
            color: var(--text-muted); border: 1px solid var(--card-border);
            border-radius: 10px; transition: all 0.3s; background: rgba(0,0,0,0.2);
        }

        .role-tab-btn.active {
            background: rgba(189, 0, 255, 0.15);
            border-color: var(--accent-purple); color: white;
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.2);
        }
        
        .role-tab-btn.active.org-btn {
            background: rgba(0, 242, 255, 0.15);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* --- Sub Tabs --- */
        .sub-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sub-tab {
            flex: 1; text-align: center; padding-bottom: 10px;
            font-size: 0.9rem; color: #666; cursor: pointer; position: relative;
        }
        .sub-tab.active { color: white; font-weight: bold; }
        .sub-tab.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px;
            background: var(--accent-purple);
        }

        /* --- Forms --- */
        .form-section { display: none; animation: fadeIn 0.4s ease-out; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        .form-control {
            width: 100%; background: var(--input-bg);
            border: 1px solid var(--card-border); border-radius: 10px;
            padding: 12px 15px 12px 45px; color: white;
            font-family: var(--font-body); font-size: 1rem; outline: none; transition: 0.3s;
        }
        .form-control:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .submit-btn {
            width: 100%; padding: 12px; background: var(--accent-gradient);
            border: none; border-radius: 10px; color: white;
            font-family: var(--font-display); font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s; margin-top: 5px;
        }
        .submit-btn:active { transform: scale(0.98); }

        /* Organizer Apply Link */
        .org-apply-box {
            margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .org-apply-btn {
            display: inline-block; padding: 10px 20px;
            border: 1px solid var(--accent-cyan); border-radius: 20px;
            color: var(--accent-cyan); text-decoration: none; font-size: 0.8rem;
            transition: 0.3s;
        }
        .org-apply-btn:hover { background: var(--accent-cyan); color: black; }

        /* Loading */
        .loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,5,17,0.95); z-index: 20; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #333;
            border-top: 4px solid var(--accent-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .error-msg { color: #ff0055; text-align: center; margin-bottom: 15px; font-size: 0.9rem; display: none; }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            
            <div class="logo-area">
                <div class="logo-icon"><i class="fa-solid fa-bolt"></i></div>
                <div class="app-name">TOURNYX</div>
            </div>

            <div class="role-tabs">
                <div class="role-tab-btn active" id="btnRolePlayer" onclick="switchRole('player')">
                    <i class="fa-solid fa-user"></i> PLAYER
                </div>
                <div class="role-tab-btn org-btn" id="btnRoleOrg" onclick="switchRole('organizer')">
                    <i class="fa-solid fa-crown"></i> ORGANIZER
                </div>
            </div>

            <div class="error-msg" id="errorMsg">Invalid Credentials</div>

            <div id="playerSection" class="form-section active">
                <div class="sub-tabs">
                    <div class="sub-tab active" onclick="switchPlayerSub('login')">LOGIN</div>
                    <div class="sub-tab" onclick="switchPlayerSub('signup')">SIGN UP</div>
                </div>

                <form id="playerLoginForm" style="display:block;">
                    <div class="input-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" name="email" class="form-control" placeholder="Player Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="submit-btn">PLAYER LOGIN</button>
                </form>

                <form id="playerSignupForm" style="display:none;">
                    <div class="input-group">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-gamepad input-icon"></i>
                        <input type="text" name="ign" class="form-control" placeholder="In-Game Name (IGN)" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" name="password" class="form-control" placeholder="Create Password" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-gift input-icon"></i>
                        <input type="text" name="referral" class="form-control" placeholder="Referral Code (Optional)">
                    </div>
                    <button type="submit" class="submit-btn">CREATE ACCOUNT</button>
                </form>
            </div>

            <div id="organizerSection" class="form-section">
                <p style="text-align:center; color:#aaa; font-size:0.85rem; margin-bottom:15px;">
                    Restricted Access. Admin Approval Required.
                </p>
                <form id="organizerLoginForm">
                    <div class="input-group">
                        <i class="fa-solid fa-shield-halved input-icon" style="color:var(--accent-cyan)"></i>
                        <input type="email" name="email" class="form-control" placeholder="Organizer Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-key input-icon" style="color:var(--accent-cyan)"></i>
                        <input type="password" name="password" class="form-control" placeholder="Access Key" required>
                    </div>
                    <button type="submit" class="submit-btn" style="background:var(--accent-cyan); color:black;">ORGANIZER LOGIN</button>
                </form>

                <div class="org-apply-box">
                    <p style="font-size:0.8rem; color:#888; margin-bottom:10px;">Want to host tournaments?</p>
                    <a href="https://docs.google.com/forms/d/e/1FAIpQLSe6k-ejzzvmEdYU6ynHlMIyr_PgQibH5ViBV5_v3HBpCdIbjw/viewform?usp=dialog" target="_blank" class="org-apply-btn">
                        Apply for Access <i class="fa-solid fa-arrow-up-right-from-square"></i>
                    </a>
                </div>
            </div>

            <div class="loading-overlay" id="loader">
                <div class="spinner"></div>
                <div style="font-family: var(--font-display); color:white" id="loadingText">AUTHENTICATING...</div>
            </div>

        </div>
    </div>

    <script>
        // --- Particles ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()*0.5-0.25; this.vy=Math.random()*0.5-0.25; this.size=Math.random()*2; }
            u(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx=-this.vx; if(this.y<0||this.y>canvas.height)this.vy=-this.vy; }
            d(){ ctx.fillStyle='rgba(0,242,255,0.3)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0;i<60;i++) particles.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();

        // --- GOOGLE APPS SCRIPT CONFIG ---
        // 👇 PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE 👇
        const API_URL = 'https://script.google.com/macros/s/AKfycbynNLDDXS1wMrU6RGnk4nKb1jfQkQGuqrNIKWAt8wf46MaKP6y1rwGmSJg5fmm4KYU/exec';
        
        // --- Tabs Logic ---
        const playerSec = document.getElementById('playerSection');
        const orgSec = document.getElementById('organizerSection');
        const btnPlayer = document.getElementById('btnRolePlayer');
        const btnOrg = document.getElementById('btnRoleOrg');
        const errorMsg = document.getElementById('errorMsg');

        function switchRole(role) {
            errorMsg.style.display = 'none';
            if(role === 'player') {
                btnPlayer.classList.add('active'); btnOrg.classList.remove('active');
                playerSec.classList.add('active'); orgSec.classList.remove('active');
            } else {
                btnOrg.classList.add('active'); btnPlayer.classList.remove('active');
                orgSec.classList.add('active'); playerSec.classList.remove('active');
            }
        }

        function switchPlayerSub(sub) {
            const tabs = document.querySelectorAll('.sub-tab');
            const pLogin = document.getElementById('playerLoginForm');
            const pSignup = document.getElementById('playerSignupForm');
            errorMsg.style.display = 'none';

            if(sub === 'login') {
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
                pLogin.style.display = 'block'; pSignup.style.display = 'none';
            } else {
                tabs[1].classList.add('active'); tabs[0].classList.remove('active');
                pSignup.style.display = 'block'; pLogin.style.display = 'none';
            }
        }

        // --- AUTH LOGIC ---
        const loader = document.getElementById('loader');
        const loadingText = document.getElementById('loadingText');

        // PLAYER SIGNUP
        document.getElementById('playerSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("CREATING ACCOUNT...");
            
            const formData = new FormData(e.target);
            const rawData = Object.fromEntries(formData);
            
            // Payload for Apps Script (UPDATED WITH REFERRAL DATA)
            const payload = {
                action: 'signup',
                username: rawData.username,
                ign: rawData.ign,
                email: rawData.email,
                password: rawData.password,
                referral: rawData.referral || "", // Added referral to the backend payload
                role: 'player'
            };

            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                const result = await res.json();
                
                if(result.status === 'success') {
                    // Auto login on success or redirect
                    alert("Account Created! Please Login.");
                    switchPlayerSub('login');
                    loader.classList.remove('active');
                } else {
                    showError("Signup Failed: " + result.data);
                }
            } catch (err) { showError("Connection Error. Try again."); console.error(err); }
        });

        // PLAYER LOGIN
        document.getElementById('playerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("VERIFYING PLAYER...");
            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    loginSuccess(result.data, 'https://tournyx.blogspot.com/p/tournyx-ultimate-esports-platform_95.html?m=1');
                } else { 
                    showError("Invalid Credentials"); 
                }
            } catch (err) { showError("Network Error."); console.error(err); }
        });

        // ORGANIZER LOGIN
        document.getElementById('organizerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            startLoad("VERIFYING ADMIN ACCESS...");
            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const res = await fetch(API_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: 'login', email: email, password: password }) 
                });
                const result = await res.json();
                
                if (result.status === 'success') {
                    // Verify Role
                    if(result.data.role === 'organizer') {
                        loginSuccess(result.data, 'https://tournyx.blogspot.com/p/my-profile-tournyx-root-primary-bg_83.html');
                    } else {
                        showError("Access Denied. Not an Organizer.");
                    }
                } else { 
                    showError("Invalid Organizer Credentials"); 
                }
            } catch (err) { showError("System Error."); console.error(err); }
        });

        function startLoad(msg) { loader.classList.add('active'); loadingText.innerText = msg; errorMsg.style.display = 'none'; }
        function showError(msg) { loader.classList.remove('active'); errorMsg.innerText = msg; errorMsg.style.display = 'block'; }
        
        function loginSuccess(user, redirectUrl) {
            localStorage.setItem('tournyx_user', JSON.stringify(user));
            window.location.href = redirectUrl;
        }

        // --- AUTO-SWITCH TO ORG TAB ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('tab') === 'organizer') {
            switchRole('organizer');
        }
    </script>
</body>
</html>
